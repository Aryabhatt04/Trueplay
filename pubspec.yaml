name: videoplayer
description: "ad free video player"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  video_player: ^2.8.2
  file_picker: ^8.0.0
  photo_manager: ^3.0.0
  shared_preferences: ^2.2.2
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.7
  path: ^1.9.1
  path_provider: ^2.1.0
  saver_gallery: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/trueplayer.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/